<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Patient Login | HydraCore</title>
  <link rel="stylesheet" href="assets/css/bootstrap.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <style>
    .auth-bg { background-color: var(--bg-soft); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
    .auth-card { max-width: 450px; width: 100%; padding: 3rem; text-align: center; }
    label:not(.d-flex) { display: block; text-align: left; }
  </style>
</head>
<body class="auth-bg">
  
  <div class="container fade-up d-flex justify-content-center">
    <div class="glass-card auth-card">
      <a href="index.html" class="nav-brand justify-content-center mb-4 text-center mx-auto">
        <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 2 4 10.5L22 17l-9 2-8-2 2-4.5L12 2Z"></path>
          <path d="M12 2v20"></path>
        </svg>
        HydraCore
      </a>
      
      <h3 class="mb-2">Welcome Back</h3>
      <p class="text-muted mb-4">Login to view your treatment records or rebook.</p>

      <form onsubmit="event.preventDefault(); window.location.href='index.html';">
        <div class="mb-3 text-start">
          <label class="mb-1 text-primary font-weight-bold" style="font-size:0.9rem;">Email Address</label>
          <input type="email" class="form-input w-100" placeholder="Enter your email" required>
        </div>
        <div class="mb-4 text-start">
          <label class="mb-1 text-primary font-weight-bold" style="font-size:0.9rem;">Password</label>
          <input type="password" class="form-input w-100" placeholder="••••••••" required>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4 gap-2" style="font-size: 0.8rem; flex-wrap: nowrap;">
          <label class="d-flex align-items-center gap-1" style="color: var(--text-secondary); cursor:pointer; white-space: nowrap;">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" style="white-space: nowrap;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-4">Sign In</button>

        <div class="d-flex align-items-center mb-4 text-muted" style="font-size: 0.8rem; letter-spacing: 1px;">
          <div style="flex: 1; height: 1px; background: var(--bg-border);"></div>
          <span class="px-3" style="white-space:nowrap; opacity:0.6; text-transform:uppercase; font-weight:700;">Continue With</span>
          <div style="flex: 1; height: 1px; background: var(--bg-border);"></div>
        </div>

        <div class="social-auth-container">
          <a href="#" class="social-auth-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
              <path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083A19.694 19.694 0 0 0 44 24c0 11.045-8.955 20-20 20c-7.773 0-14.495-4.444-17.805-10.921l6.522-5.025C14.381 32.683 18.798 36 24 36c5.223 0 9.654-3.343 11.303-8H24v-8h19.611z"/>
            </svg>
            Google
          </a>
          <a href="#" class="social-auth-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 384 512" fill="currentColor">
              <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 21.8-88.5 21.8-11.4 0-51.1-20.8-83.6-20.1-42.3.8-81.8 26.1-103.8 64.4-44.6 77.4-11.5 191.1 32.6 255.4 21.6 31.2 47.7 65.4 81.3 64.1 32.7-1.3 45.1-21.1 84.7-21.1 39.5 0 51.1 21.1 85.4 20.4 34.9-.7 57.3-30.5 78.9-61.9 25.1-36.1 35.2-71.1 35.5-73-.8-.3-68.4-26.3-68.8-103.3zM286.7 87.2c16-19.1 26.7-45.7 23.7-72.1-22.9 1-50.6 15.3-67 34.4-14.8 17.1-27.7 44.4-24.1 70 25.3 2 51.2-13.2 67.4-32.3z"/>
            </svg>
            Apple
          </a>
        </div>

      </form>

      <p class="text-secondary">Don't have an account? <a href="signup.html" style="font-weight:600;">Sign up</a></p>
    </div>
  </div>

  <div style="position:fixed; bottom: 20px; right: 20px; z-index: 100;">
    <button id="theme-toggle" class="theme-toggle-btn" style="background:var(--bg-surface); box-shadow:var(--shadow-md);"></button>
  </div>

  <script src="assets/js/gsap.min.js"></script>
  <script src="assets/js/ScrollTrigger.min.js"></script>
  <script src="assets/js/theme-toggle.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
